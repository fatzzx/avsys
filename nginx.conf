events {
  worker_connections 1024;
}

http {
  # Rate limiting: 20 req/s por IP (burst permite picos curtos sem erro imediato)
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

  # Upstreams — Docker DNS distribui automaticamente entre réplicas do mesmo serviço.
  # Para múltiplas réplicas (docker compose up --scale flight-catalog=2),
  # o Docker resolve "flight-catalog" para todos os IPs ativos via round-robin DNS.
  upstream flight_catalog_upstream {
    least_conn;
    server flight-catalog:3001 max_fails=3 fail_timeout=30s;
  }

  upstream reservation_upstream {
    server reservation-service:3002 max_fails=3 fail_timeout=30s;
  }

  upstream payment_upstream {
    # ip_hash garante que callbacks do provedor de pagamento
    # cheguem sempre à mesma instância
    ip_hash;
    server payment-service:3003 max_fails=3 fail_timeout=30s;
  }

  server {
    listen 80;
    server_name _;

    # Headers de proxy padrão para todos os location blocks
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Catálogo de Voos ─────────────────────────────────────────────────────
    # proxy_pass com URI faz strip do prefixo /api:
    #   /api/flights/search → /flights/search (no serviço)
    location /api/flights/ {
      limit_req zone=api_limit burst=40 nodelay;
      proxy_pass         http://flight_catalog_upstream/flights/;
      proxy_connect_timeout 5s;
      proxy_read_timeout    30s;
    }

    # ── Reservas ─────────────────────────────────────────────────────────────
    location /api/reservations/ {
      limit_req zone=api_limit burst=20 nodelay;
      proxy_pass         http://reservation_upstream/reservations/;
      proxy_connect_timeout 5s;
      proxy_read_timeout    35s;
    }

    # ── Pagamentos ───────────────────────────────────────────────────────────
    location /api/payments/ {
      limit_req zone=api_limit burst=10 nodelay;
      proxy_pass         http://payment_upstream/payments/;
      proxy_connect_timeout 5s;
      proxy_read_timeout    60s;
    }

    # ── Eventos em tempo real (stream para o painel de arquitetura) ──────────
    location = /api/events {
      proxy_pass         http://reservation_upstream/events;
      proxy_connect_timeout 5s;
      proxy_read_timeout    5s;
      add_header Access-Control-Allow-Origin *;
    }

    # ── Health checks individuais por serviço ────────────────────────────────
    location = /api/catalog/health  { proxy_pass http://flight_catalog_upstream/health; }
    location = /api/booking/health  { proxy_pass http://reservation_upstream/health; }
    location = /api/payment/health  { proxy_pass http://payment_upstream/health; }

    # ── Health do gateway ────────────────────────────────────────────────────
    location /health {
      add_header Content-Type application/json;
      return 200 '{"status":"ok","gateway":"nginx"}';
    }

    # ── Frontend estático ────────────────────────────────────────────────────
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri /index.html;
    }
  }
}
