            - generic:
              - generic: ⚠ Double-Booking
              - generic: Dois usuários obtêm reservas válidas para o mesmo assento — anomalia crítica de corretude que impacta diretamente a experiência do passageiro
            - generic:
              - generic: ↔ Lost Update
              - generic: Sem coordenação, atualizações de múltiplos processos se sobrescrevem silenciosamente — a segunda escrita invalida a primeira
            - generic:
              - generic: 🔀 Race Condition
              - generic: Dois processos leem "available" → passam na validação → ambos escrevem com sucesso — resultado incorreto sem erro explícito
          - generic:
